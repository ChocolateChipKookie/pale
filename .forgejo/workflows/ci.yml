name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-native:
    runs-on: zig
    steps:
      - uses: ${{ secrets.ACTIONS_URL }}/checkout@main

      - name: Install raylib system deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxi-dev libxcursor-dev

      - name: Build native (release)
        run: zig build --release=fast

      - name: Run native tests
        run: zig build test

  wasm-exports-test:
    runs-on: zig
    steps:
      - uses: ${{ secrets.ACTIONS_URL }}/checkout@main

      - name: Smoke-test wasm exports natively
        run: zig build wasm-exports-test

  build-wasm:
    runs-on: zig
    steps:
      - uses: ${{ secrets.ACTIONS_URL }}/checkout@main

      - name: Install brotli (for the size budget check)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends python3-brotli

      - name: Build the web app and enforce the brotli size budget
        run: zig build size --release=small -Dthumbnails=false
